<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – Holy Dham CMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F0EB;color:#2D1F2E}
.container{width:100%;max-width:420px;padding:20px}
.card{background:white;border-radius:20px;padding:48px 40px;box-shadow:0 8px 40px rgba(45,31,46,.06);border:1px solid #E8DDD0}
.brand{text-align:center;margin-bottom:36px}
.brand .icon{font-size:40px;margin-bottom:12px;display:block}
.brand h1{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:4px}
.brand p{color:#8A7A8B;font-size:14px;line-height:1.5}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;border:1px solid #E8DDD0;border-radius:12px;font-family:'DM Sans';font-size:15px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#C76B8F}
.submit-btn{width:100%;padding:16px;background:#C76B8F;color:white;border:none;border-radius:12px;font-family:'DM Sans';font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px}
.submit-btn:hover{background:#A04870}
.flash{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:13px}
.flash-error{background:#FDE8E8;color:#8B2020}
.flash-info{background:#E3F2FD;color:#1565C0}
.footer{text-align:center;margin-top:24px;font-size:13px;color:#8A7A8B}
.footer a{color:#C76B8F;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="brand">
<span class="icon">🔐</span>
<h1>Forgot Password</h1>
<p>Enter your registered email address and we'll send you a link to reset your password.</p>
</div>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}{% for cat, msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
{% endwith %}
<form method="POST">
<div class="form-group">
<label>Email Address</label>
<input name="email" type="email" placeholder="Enter your email" required autofocus>
</div>
<button class="submit-btn" type="submit">Send Reset Link</button>
</form>
</div>
<div class="footer">
<a href="{{ url_for('admin_login') }}">← Back to Login</a>
</div>
</div>
</body>
</html>
